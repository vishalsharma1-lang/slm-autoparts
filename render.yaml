services:
  # Backend — Spring Boot API (H2 in-memory, auto-seeded)
  - type: web
    name: slm-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: FRONTEND_URL
        value: https://slm-frontend.onrender.com

  # Frontend — React static site
  - type: web
    name: slm-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://slm-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
