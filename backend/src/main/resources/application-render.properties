server.port=${PORT:8081}

# H2 in-memory — DataSeeder re-populates on every startup (free, no external DB)
spring.datasource.url=jdbc:h2:mem:slmdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable H2 console on production
spring.h2.console.enabled=false

# CORS — allow all since frontend is served from same origin
spring.web.cors.allowed-origins=*
